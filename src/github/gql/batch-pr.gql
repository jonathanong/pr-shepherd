query BatchPr(
  $owner: String!
  $repo: String!
  $pr: Int!
  $threadsCursor: String
  $checksCursor: String
  $commentsCursor: String
  $changesRequestedCursor: String
  $reviewSummariesCursor: String
  $approvedReviewsCursor: String
) {
  repository(owner: $owner, name: $repo) {
    pullRequest(number: $pr) {
      id
      number
      state
      isDraft
      mergeable
      mergeStateStatus
      reviewDecision
      headRefOid
      headRefName
      headRepository {
        nameWithOwner
      }
      baseRefName
      baseRef {
        branchProtectionRule {
          requiresApprovingReviews
          requiredApprovingReviewCount
          requiresConversationResolution
          requiresStatusChecks
          requiredStatusCheckContexts
        }
      }
      # Not paginated — capped at 50; PRs with more pending reviewers truncate silently.
      reviewRequests(last: 50) {
        nodes {
          requestedReviewer {
            ... on Bot {
              login
            }
            ... on User {
              login
            }
            ... on Team {
              name
            }
          }
        }
      }
      # Not paginated — capped at 100 distinct reviewers; PRs with more are not plausible
      # in practice. Used to derive which CHANGES_REQUESTED rows are superseded by a later
      # APPROVED/DISMISSED review from the same author.
      latestReviews(last: 100) {
        nodes {
          author {
            __typename
            login
          }
          state
        }
      }
      reviewThreads(last: 100, before: $threadsCursor) {
        pageInfo {
          hasPreviousPage
          startCursor
        }
        nodes {
          id
          isResolved
          isOutdated
          path
          line
          startLine
          comments(first: 100) {
            pageInfo {
              hasNextPage
              endCursor
            }
            nodes {
              id
              isMinimized
              url
              author {
                __typename
                login
              }
              pullRequestReview {
                id
              }
              body
              path
              line
              startLine
              createdAt
            }
          }
        }
      }
      comments(last: 100, before: $commentsCursor) {
        pageInfo {
          hasPreviousPage
          startCursor
        }
        nodes {
          id
          isMinimized
          url
          author {
            __typename
            login
          }
          body
          createdAt
        }
      }
      changesRequestedReviews: reviews(
        states: CHANGES_REQUESTED
        last: 50
        before: $changesRequestedCursor
      ) {
        pageInfo {
          hasPreviousPage
          startCursor
        }
        nodes {
          id
          author {
            __typename
            login
          }
          body
        }
      }
      reviewSummaries: reviews(states: COMMENTED, last: 50, before: $reviewSummariesCursor) {
        pageInfo {
          hasPreviousPage
          startCursor
        }
        nodes {
          id
          isMinimized
          author {
            __typename
            login
          }
          body
        }
      }
      approvedReviews: reviews(states: APPROVED, last: 50, before: $approvedReviewsCursor) {
        pageInfo {
          hasPreviousPage
          startCursor
        }
        nodes {
          id
          isMinimized
          author {
            __typename
            login
          }
          body
        }
      }
      commits(last: 1) {
        nodes {
          commit {
            oid
            statusCheckRollup {
              contexts(first: 100, after: $checksCursor) {
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  __typename
                  ... on CheckRun {
                    id
                    name
                    status
                    conclusion
                    detailsUrl
                    startedAt
                    title
                    summary
                    checkSuite {
                      createdAt
                      updatedAt
                      workflowRun {
                        event
                        createdAt
                        updatedAt
                      }
                    }
                  }
                  ... on StatusContext {
                    context
                    state
                    createdAt
                    targetUrl
                    description
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
