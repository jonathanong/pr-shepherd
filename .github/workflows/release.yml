name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - premajor
          - preminor
          - prepatch
          - prerelease

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, tag
        id: bump
        run: |
          npm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          node .github/scripts/sync-plugin-version.mjs
          git add package.json package-lock.json .claude-plugin/plugin.json
          git commit -m "chore(release): v$VERSION"
          git tag -a "v$VERSION" -m "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: git push origin HEAD:main --follow-tags

      - run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
